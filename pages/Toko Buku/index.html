<!DOCTYPE html>

<head>

<body id="top" class="bg-light">

    <div id="tempat-navbar"></div>

                <a href="http://wa.me/081515709786" target="_blank" class="btn fw-bold w-100 paket-btn-custom"

            </div>

            <div class="katalog-card">
                <div class="image-container">
                    <img src="/public/ig.webp" alt="Cover Buku 2" class="book-cover">

    <div id="tempat-footer"></div>
