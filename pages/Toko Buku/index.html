<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Buku - BungDed Grafika</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/style/main.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f3f4f6;
            /* Warna background abu-abu marketplace */
        }

        .bg-gradient-primary {
            background: linear-gradient(135deg, #001533 0%, #002967 100%);
        }

        .circle-decoration-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            top: -100px;
            right: -50px;
            pointer-events: none;
        }

        .circle-decoration-2 {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            bottom: -50px;
            left: 10%;
            pointer-events: none;
        }

        /* ================= DESAIN KARTU BUKU (KEMBAR IDENTIK PERCETAKAN) ================= */
        .katalog-container {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)) !important;
            gap: 16px !important;
            padding: 20px 0 !important;
        }

        /* Paksa kartu berbentuk kotak putih dengan border halus dan padding */
        .katalog-card {
            background: #ffffff !important;
            border-radius: 8px !important;
            border: 1px solid #e5e7eb !important;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03) !important;
            display: flex !important;
            flex-direction: column !important;
            height: 100% !important;
            padding: 14px !important;
            /* Padding keliling persis screenshot */
            transition: all 0.2s ease !important;
        }

        .katalog-card:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08) !important;
        }

        /* Area kotak gambar (Background abu-abu terang, rasio 1:1 kotak sempurna) */
        .katalog-card .image-container {
            background-color: #f8f9fa !important;
            width: 100% !important;
            aspect-ratio: 1/1 !important;
            border-radius: 4px !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            margin-bottom: 12px !important;
            overflow: hidden !important;
            border: none !important;
        }

        .katalog-card .book-cover {
            max-width: 85% !important;
            max-height: 85% !important;
            object-fit: contain !important;
            box-shadow: none !important;
            /* Hapus shadow buku yang aneh-aneh */
            transition: transform 0.3s ease !important;
        }

        .katalog-card:hover .book-cover {
            transform: scale(1.05) !important;
        }

        /* Detail Teks */
        .katalog-card .book-info,
        .katalog-card>div:not(.image-container) {
            padding: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            flex-grow: 1 !important;
            text-align: left !important;
        }

        .katalog-card .book-title {
            font-size: 0.9rem !important;
            font-weight: 600 !important;
            color: #1f2937 !important;
            margin-bottom: 6px !important;
            line-height: 1.4 !important;
            display: -webkit-box !important;
            -webkit-line-clamp: 2 !important;
            -webkit-box-orient: vertical !important;
            overflow: hidden !important;
            min-height: 2.8em !important;
        }

        .katalog-card .book-author {
            font-size: 0.75rem !important;
            color: #6b7280 !important;
            margin-bottom: 10px !important;
            display: -webkit-box !important;
            -webkit-line-clamp: 1 !important;
            -webkit-box-orient: vertical !important;
            overflow: hidden !important;
        }

        .katalog-card .book-price {
            font-size: 1.2rem !important;
            font-weight: 800 !important;
            color: #002967 !important;
            margin-top: auto !important;
            margin-bottom: 16px !important;
        }

        /* Tombol Order Sekarang persis di screenshot (Solid Navy) */
        .katalog-card button,
        .katalog-card .btn {
            background-color: #002967 !important;
            color: #ffffff !important;
            border: none !important;
            border-radius: 6px !important;
            font-size: 0.85rem !important;
            font-weight: 600 !important;
            padding: 8px 0 !important;
            width: 100% !important;
            transition: 0.2s ease !important;
        }

        .katalog-card button:hover,
        .katalog-card .btn:hover {
            background-color: #001533 !important;
            /* Warna biru lebih gelap saat ditekan */
            color: #ffffff !important;
            box-shadow: none !important;
        }

        /* Responsif HP */
        @media (max-width: 576px) {
            .katalog-container {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px !important;
            }

            .katalog-card {
                padding: 10px !important;
            }

            .katalog-card .book-title {
                font-size: 0.85rem !important;
            }

            .katalog-card .book-price {
                font-size: 1.05rem !important;
            }

            .katalog-card button {
                font-size: 0.8rem !important;
                padding: 6px 0 !important;
            }
        }

        @media (max-width: 768px) {
            .header-section {
                padding-top: 120px !important;
                padding-bottom: 60px !important;
            }
        }
    </style>
</head>

<body id="top">

    <div id="tempat-navbar"></div>

    <section
        class="position-relative d-flex flex-column justify-content-center text-center bg-gradient-primary header-section"
        style="padding-top: 140px; padding-bottom: 60px; overflow: hidden;">

        <div class="circle-decoration-1"></div>
        <div class="circle-decoration-2"></div>

        <div class="container position-relative z-1 text-white">
            <span class="badge rounded-pill mb-3 px-3 py-2"
                style="background-color: rgba(255,255,255,0.15); font-weight: 600; letter-spacing: 1px;">
                KOLEKSI KARYA
            </span>
            <h1 class="display-5 fw-bold mb-3">Toko Buku BungDed</h1>
            <p class="lead mx-auto opacity-75" style="max-width: 650px; font-size: 1.1rem;">
                Temukan dan miliki karya-karya terbaik dan inspiratif yang telah diterbitkan bersama kami.
            </p>
        </div>
    </section>

    <section class="py-4 py-md-5" style="min-height: 60vh;">
        <div class="container position-relative z-2">

            <div class="katalog-container text-start" id="tempat-etalase-buku">
            </div>

        </div>
    </section>

    <div class="modal fade" id="modalProduk" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

                <div class="modal-header border-0 pb-0 pt-4 px-4 text-white" style="background-color: #002967;">
                    <h5 class="modal-title fw-bold fs-4">Detail Pesanan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div
                    style="height: 20px; background-color: #002967; border-bottom-left-radius: 50%; border-bottom-right-radius: 50%; margin-bottom: 20px;">
                </div>

                <div class="modal-body px-4 pb-4 text-start">
                    <div class="row align-items-center">
                        <div class="col-md-5 mb-4 mb-md-0 text-center">
                            <div class="bg-light rounded-3 p-3 h-100 d-flex align-items-center justify-content-center border"
                                style="border-color: #e2e8f0 !important;">
                                <img id="detailGambar" src="" alt="Produk" class="img-fluid rounded"
                                    style="max-height: 250px; object-fit: contain;">
                            </div>
                        </div>

                        <div class="col-md-7">
                            <h4 id="detailJudul" class="fw-bold mb-2" style="color: #212121; letter-spacing: -0.5px;">
                                Nama Produk</h4>
                            <p id="detailDeskripsi" class="text-muted small mb-4" style="line-height: 1.6;">Deskripsi
                                singkat produk ada di sini.</p>

                            <div class="p-3 bg-light rounded-3 mb-4 border" style="border-color: #e2e8f0 !important;">
                                <span class="d-block text-muted small fw-bold mb-1 text-uppercase">Total Biaya:</span>
                                <h3 id="detailHarga" class="fw-bold mb-0" style="color: #002967;">Harga Produk</h3>
                            </div>

                            <div class="row g-3">
                                <div class="col-12 col-sm-5">
                                    <label for="inputKuantitas"
                                        class="form-label fw-bold small text-muted text-uppercase">Jumlah</label>
                                    <input type="number" class="form-control form-control-lg text-center fw-bold"
                                        id="inputKuantitas" value="1" min="1"
                                        style="border: 2px solid #cbd5e1; border-radius: 8px;">
                                </div>
                                <div class="col-12 col-sm-7">
                                    <label for="inputCatatan"
                                        class="form-label fw-bold small text-muted text-uppercase">Catatan
                                        (Opsional)</label>
                                    <textarea class="form-control" id="inputCatatan" rows="2"
                                        placeholder="Tulis pesan..."
                                        style="border: 2px solid #cbd5e1; border-radius: 8px; resize: none;"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer bg-light border-top-0 px-4 py-3">
                    <button type="button" class="btn fw-bold px-4" data-bs-dismiss="modal"
                        style="background-color: transparent; border: 2px solid #6b7280; color: #6b7280; border-radius: 8px;">
                        Batal
                    </button>
                    <button type="button" class="btn fw-bold px-5 m-0"
                        style="background-color: #002967; color: white; border: none; border-radius: 8px; transition: 0.2s;"
                        onmouseover="this.style.backgroundColor='#001533';"
                        onmouseout="this.style.backgroundColor='#002967';" onclick="checkoutWA()">
                        Pesan Sekarang
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="tempat-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/function/navbar.js"></script>
    <script src="/function/footer.js"></script>
    <script src="/function/keranjang.js"></script>
    <script src="/function/databuku.js"></script>

</body>

</html>
